# compose.yaml
name: bb
services:
  influxdb3-core:
    container_name: influxdb3-core
    image: influxdb:3-core
    ports:
      - 8181:8181
    command:
      - influxdb3
      - serve
      - --node-id=node0
      - --object-store=file
      - --data-dir=/var/lib/influxdb3/data
      - --plugin-dir=/var/lib/influxdb3/plugins
    post_start:
      - command: sh -c "sleep 5 && influxdb3 create token --admin --format json > /etc/influxdb3/config/token.json"
        user: root

    volumes:
      - type: bind
        source: ./data/influxdb3/data
        target: /var/lib/influxdb3/data
      - type: bind
        source: ./data/influxdb3/plugins
        target: /var/lib/influxdb3/plugins
      - type: bind
        source: ./config/influxdb
        target: /etc/influxdb3/config

  mosquitto:
    image: eclipse-mosquitto
    hostname: mosquitto
    container_name: mosquitto
    restart: unless-stopped
    environment:
      - TZ=America/Chicago
      - MQTT_USERNAME=bb
      - MQTT_PASSWORD=bbpassword
    ports:
      # 1883 is bound to 127.0.0.1 inside the broker config — only loopback traffic reaches it.
      - 127.0.0.1:1883:1883
      - 9001:9001
    volumes:
      # mosquitto.conf sets allow_anonymous false and password_file /mosquitto/config/passwd.
      # Create the passwd file before starting: mosquitto_passwd -c ./config/mosquitto/passwd <username>
      # Set MQTT_USERNAME and MQTT_PASSWORD env vars for the Go client.
      - ./config/mosquitto:/mosquitto/config
      - ./data/mosquitto/data:/mosquitto/data
      - ./data/mosquitto/log:/mosquitto/log
      - ./data/mosquitto/persist:/mosquitto/persist

  influxdb3-ui:
    container_name: influxdb3-explorer
    ports:
      - 8234:80
    image: influxdata/influxdb3-ui:1.4.0

  mqtt-explorer:
    image: ghcr.io/thomasnordquist/mqtt-explorer:latest
    ports:
      - "3009:3000"
    environment:
      - MQTT_EXPLORER_SKIP_AUTH=true
    volumes:
      - mqtt-explorer-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: prometheus
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    restart: unless-stopped

volumes:
  mqtt-explorer-data:
  prometheus-data:
