# Authentication: anonymous access is disabled.
# The Go client reads MQTT_USERNAME and MQTT_PASSWORD env vars — set both before connecting.
allow_anonymous false

# password_file must exist before mosquitto starts.
# Create it with: mosquitto_passwd -c ./config/mosquitto/passwd <username>
# The docker-compose mosquitto service mounts ./config/mosquitto → /mosquitto/config,
# so the file will be visible inside the container at /mosquitto/config/passwd.
password_file /mosquitto/config/passwd

# Bind the plain MQTT listener to loopback only.
listener 1883 127.0.0.1

# WebSocket listener (local dev tooling — remains open on all interfaces).
listener 9001
protocol websockets

persistence true
persistence_location /var/lib/mosquitto/
